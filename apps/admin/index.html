<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenRelay Admin</title>
    <script>
      // Apply persisted theme before paint to avoid a flash of incorrect colors.
      (function () {
        try {
          var stored = localStorage.getItem("open-relay:theme:v1");
          var dark =
            stored === "dark" ||
            ((!stored || stored === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
