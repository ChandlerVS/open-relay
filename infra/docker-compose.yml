services:
  mysql:
    image: mysql:8.0
    container_name: open-relay-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: openrelay
      MYSQL_DATABASE: openrelay
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-popenrelay"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
    name: open-relay-mysql-data
